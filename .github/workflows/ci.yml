name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: manbaflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d manbaflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        env:
          MAMBA_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/manbaflow_test?sslmode=disable
        run: cargo test --all-targets --locked
      - name: Release build
        run: cargo build --release --locked

  agent-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Remote Worker runtime
        run: >-
          docker build
          --file docker/agent-runtime/Dockerfile
          --tag manbaflow-agent-runtime:ci
          .
