name: manbaflow

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  mamba:
    image: ${MAMBA_IMAGE:-manbaflow:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - serve
      - --bind
      - 0.0.0.0:7777
      - --allow-insecure-public-http
    ports:
      - 127.0.0.1:${MAMBA_PORT:-7777}:7777
    volumes:
      - mamba-data:/var/lib/manbaflow
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true

  caddy:
    image: caddy:2-alpine
    profiles: ["hosted"]
    restart: unless-stopped
    environment:
      MAMBA_DOMAIN: ${MAMBA_DOMAIN:-localhost}
    depends_on:
      mamba:
        condition: service_healthy
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
  mamba-data:
  caddy-data:
  caddy-config:
